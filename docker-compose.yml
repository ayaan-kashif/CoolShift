version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - HOST=0.0.0.0
      - DB_PATH=/app/data/coolshift.db
      - UPLOADS_DIR=/app/uploads
      - OUTPUTS_DIR=/app/outputs
      - CORS_ORIGIN=http://localhost:3000
      - NODE_ENV=production
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
      - backend-outputs:/app/outputs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-uploads:
  backend-outputs:
